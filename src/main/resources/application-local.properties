logging.file.name=${LOG_DIR:A:/Projetos IA/kibana-local/logs}/${spring.application.name}-${APP_ENV:local}-${PID:${random.uuid}}.json
app.logging.environment=${APP_ENV:local}

spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME_LOCAL:${DB_NAME:sistema_contabilidade}}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=${DB_USERNAME_LOCAL:${DB_USERNAME:root}}
spring.datasource.password=${DB_PASSWORD_LOCAL:${DB_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.storage.type=local
app.storage.local.base-dir=uploads/itens

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
