spring.config.import=optional:file:.env[.properties]
spring.application.name=sistema_contabilidade

spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME:sistema_contabilidade}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.session.cookie-name=SC_SESSION
app.session.ttl-minutes=30
app.session.crypto-secret=${SESSION_CRYPTO_SECRET}

app.jwt.ec-private-key=${JWT_EC_PRIVATE_KEY:}
app.jwt.ec-public-key=${JWT_EC_PUBLIC_KEY:}
app.jwt.expiration-minutes=60
app.security.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.security.rate-limit.max-requests=${APP_RATE_LIMIT_MAX_REQUESTS:120}
app.security.rate-limit.window-seconds=${APP_RATE_LIMIT_WINDOW_SECONDS:60}

spring.data.redis.host=localhost
spring.data.redis.port=6379
