spring.application.name=sistema_contabilidade

spring.datasource.url=jdbc:mysql://localhost:3306/sistema_contabilidade?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.session.cookie-name=SC_SESSION
app.session.ttl-minutes=30
app.session.crypto-secret=${SESSION_CRYPTO_SECRET:0123456789ABCDEF0123456789ABCDEF}

app.jwt.secret=${JWT_SECRET:0123456789ABCDEF0123456789ABCDEF}
app.jwt.expiration-minutes=60

spring.data.redis.host=localhost
spring.data.redis.port=6379
