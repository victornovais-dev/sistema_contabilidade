spring.config.import=optional:file:.env[.properties]
spring.application.name=sistema_contabilidade
spring.profiles.default=local

app.logging.service-version=${APP_VERSION:0.0.1}
app.logging.event-dataset=${spring.application.name}.application

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.session_factory.statement_inspector=com.sistema_contabilidade.monitoring.query.QueryCountStatementInspector

app.session.cookie-name=SC_SESSION
app.session.ttl-minutes=${APP_SESSION_TTL_MINUTES:480}
app.session.crypto-secret=${SESSION_CRYPTO_SECRET}
app.admin.route-secret=${ADMIN_ROUTE_SECRET:${SESSION_CRYPTO_SECRET}}
app.admin.ip-allowlist=${ADMIN_IP_ALLOWLIST:}

app.jwt.ec-private-key=${JWT_EC_PRIVATE_KEY:}
app.jwt.ec-public-key=${JWT_EC_PUBLIC_KEY:}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:15}
app.security.argon2.salt-length=${APP_SECURITY_ARGON2_SALT_LENGTH:16}
app.security.argon2.hash-length=${APP_SECURITY_ARGON2_HASH_LENGTH:32}
app.security.argon2.parallelism=${APP_SECURITY_ARGON2_PARALLELISM:2}
app.security.argon2.memory-cost=${APP_SECURITY_ARGON2_MEMORY_COST:65536}
app.security.argon2.time-cost=${APP_SECURITY_ARGON2_TIME_COST:3}
app.security.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.security.rate-limit.max-requests=${APP_RATE_LIMIT_MAX_REQUESTS:120}
app.security.rate-limit.window-seconds=${APP_RATE_LIMIT_WINDOW_SECONDS:60}
app.auth.login-diagnostics.enabled=false
app.default-admin.name=${DEFAULT_ADMIN_NAME:Administrador}
app.default-admin.email=${DEFAULT_ADMIN_EMAIL:admin@sistema.local}
app.default-admin.password=${DEFAULT_ADMIN_PASSWORD:}

app.query-monitor.enabled=${APP_QUERY_MONITOR_ENABLED:true}
app.query-monitor.threshold=${APP_QUERY_MONITOR_THRESHOLD:15}
app.query-monitor.add-response-header=${APP_QUERY_MONITOR_ADD_RESPONSE_HEADER:true}
app.request-timing.enabled=${APP_REQUEST_TIMING_ENABLED:true}
app.request-timing.add-response-headers=${APP_REQUEST_TIMING_ADD_RESPONSE_HEADERS:true}
app.request-timing.log-threshold-ms=${APP_REQUEST_TIMING_LOG_THRESHOLD_MS:750}
app.memory-monitor.enabled=${APP_MEMORY_MONITOR_ENABLED:true}
app.memory-monitor.scheduled-logging-enabled=${APP_MEMORY_MONITOR_SCHEDULED_LOGGING_ENABLED:false}
app.memory-monitor.fixed-delay-ms=${APP_MEMORY_MONITOR_FIXED_DELAY_MS:60000}
app.memory-monitor.heap-alert-threshold=${APP_MEMORY_MONITOR_HEAP_ALERT_THRESHOLD:0.85}
app.memory-monitor.metaspace-alert-threshold=${APP_MEMORY_MONITOR_METASPACE_ALERT_THRESHOLD:0.80}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.jvm.memory.used=true
spring.jmx.enabled=true

spring.data.redis.connect-timeout=500ms
spring.data.redis.timeout=2s
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=64
spring.data.redis.lettuce.pool.max-idle=16
spring.data.redis.lettuce.pool.min-idle=8
spring.data.redis.lettuce.pool.max-wait=50ms

spring.cache.type=caffeine
spring.cache.cache-names=userDetails,itemDescricoes,itemTiposDocumento
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=2m
