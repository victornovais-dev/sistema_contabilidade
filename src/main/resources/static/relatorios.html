<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relatorios</title>
    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
    <script>
      (function () {
        try {
          var match = document.cookie.match(/(?:^|;\s*)theme=([^;]+)/);
          var cookieTheme = match ? decodeURIComponent(match[1]) : null;
          var theme = cookieTheme || localStorage.getItem("theme");
          document.documentElement.dataset.theme = theme === "dark" ? "dark" : "light";
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/relatorios.css" />
    <link rel="stylesheet" href="assets/css/navbar.css" />
  </head>
  <body>
    <div id="navbar-root" data-navbar-root></div>

    <div class="bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="grid"></div>
    </div>

    <main class="page page-wide">
      <header class="page-header">
        <span class="chip">Relatorio</span>
        <div class="report-header-row">
          <h1>Relatorios</h1>
          <div class="role-filter-box" id="role-filter-box" hidden>
            <label for="role-filter-select">Político</label>
            <div class="custom-select" data-custom-select>
              <button
                class="custom-select-trigger"
                type="button"
                aria-haspopup="listbox"
                aria-expanded="false"
              >
                Selecione
              </button>
              <div class="custom-select-menu" role="listbox" hidden></div>
              <select id="role-filter-select" class="native-select" aria-label="Filtrar por político" aria-hidden="true">
                <option value="" disabled selected>Selecione</option>
              </select>
            </div>
          </div>
        </div>
      </header>

      <section id="report-state" class="card report-state">Carregando relatorios...</section>

      <section class="card summary-card" id="summary-card" hidden></section>

      <section class="grid-two" id="reports-grid" hidden></section>

      <template id="summary-item-template">
        <div class="summary-item">
          <p class="summary-label" data-field="label"></p>
          <h2 class="summary-value" data-field="value"></h2>
        </div>
      </template>

      <template id="report-card-template">
        <article class="card report-card">
          <header data-field="header">
            <h3 data-field="title"></h3>
            <span data-field="count"></span>
          </header>
          <div data-field="list"></div>
        </article>
      </template>

      <template id="report-row-template">
        <div data-field="row">
          <span data-field="label"></span>
          <strong data-field="value"></strong>
        </div>
      </template>

      <template id="report-empty-template">
        <div data-field="empty">
          <span>Sem dados no periodo</span>
        </div>
      </template>

      <template id="report-overview-row-template">
        <div class="report-row-overview">
          <span>Total</span>
          <strong data-field="value"></strong>
        </div>
      </template>

      <section class="report-actions">
        <button class="btn btn-primary" id="download-report-btn" type="button">
          Baixar relatorio (PDF)
        </button>
      </section>
    </main>

    <script src="assets/js/navbar.js" defer></script>
    <script src="assets/js/role-dropdown.js" defer></script>
    <script src="assets/js/relatorios.js" defer></script>
  </body>
</html>
