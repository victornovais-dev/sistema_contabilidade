<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Comprovantes</title>
    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
    <script>
      (function () {
        try {
          var match = document.cookie.match(/(?:^|;\s*)theme=([^;]+)/);
          var cookieTheme = match ? decodeURIComponent(match[1]) : null;
          var theme = cookieTheme || localStorage.getItem("theme");
          document.documentElement.dataset.theme = theme === "dark" ? "dark" : "light";
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <link rel="stylesheet" href="assets/css/lista_comprovantes.css" />
    <link rel="stylesheet" href="assets/css/navbar.css" />
  </head>
  <body>
    <div id="navbar-root" data-navbar-root></div>

    <div class="bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="grid"></div>
    </div>

    <main class="page page-wide">
      <header class="page-header">
        <span class="chip">Histórico</span>
        <h1>Comprovantes</h1>
      </header>

      <section class="filters filters-card">
        <label class="filter-field">
          <span>Pesquisar</span>
          <div class="filter-field-input-wrap">
            <span class="filter-field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" class="h-4 w-4">
                <rect x="3" y="5" width="18" height="16" rx="3" fill="none" stroke="currentColor" stroke-width="1.6" />
                <path d="M3 9h18" fill="none" stroke="currentColor" stroke-width="1.6" />
                <path d="M8 3v4M16 3v4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
              </svg>
            </span>
            <input class="filter-date-range" type="text" placeholder="Filtrar por período" />
          </div>
        </label>
        <label class="filter-field filter-type">
          <span>Tipo</span>
          <select class="filter-type-select">
            <option value="">Todos</option>
            <option value="receita">Receita</option>
            <option value="despesa">Despesa</option>
          </select>
        </label>
        <button class="btn btn-secondary filter-clear" type="button">Limpar</button>
      </section>

      <section id="list-state" class="list-state" hidden></section>
      <section class="list" id="items-list"></section>
    </main>
    <template id="item-card-template">
      <article class="item-card">
        <div class="item-info">
          <div class="item-label">Valor</div>
          <div class="item-value" data-field="valor"></div>
        </div>
        <div class="item-info">
          <div class="item-label">Tipo</div>
          <div class="item-value" data-field="tipo"></div>
        </div>
        <div class="item-info">
          <div class="item-label">Data</div>
          <div class="item-value" data-field="data"></div>
        </div>
        <div class="item-info">
          <div class="item-label">Horário</div>
          <div class="item-value" data-field="horario"></div>
        </div>
        <div class="item-info item-info--descricao">
          <div class="item-label">Descrição</div>
          <div class="item-value" data-field="descricao"></div>
        </div>
        <div class="item-info item-info--razao">
          <div class="item-label">Razão social / Nome</div>
          <div class="item-value" data-field="razaoSocialNome"></div>
        </div>
        <div class="item-info item-info--cnpj">
          <div class="item-label">CNPJ / CPF</div>
          <div class="item-value" data-field="cnpjCpf"></div>
        </div>
        <div class="item-actions">
          <button class="btn btn-info item-observacao" type="button" aria-label="Ver observação">
            <span class="icon-info" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2" />
                <path
                  d="M12 10v6"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
                <circle cx="12" cy="7.5" r="1" fill="currentColor" />
              </svg>
            </span>
          </button>
          <button class="btn btn-secondary item-upload" type="button" aria-label="Gerenciar anexos">
            <span class="icon-upload" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path
                  d="M12 4l-5 5m5-5l5 5M12 4v12"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M5 20h14"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </span>
          </button>
          <a class="btn btn-secondary item-download" target="_blank" rel="noopener noreferrer">
            Baixar arquivos
          </a>
          <button class="btn btn-danger delete-item" type="button">Excluir</button>
        </div>
      </article>
    </template>
    <div class="confirm-overlay" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="confirm-card" role="status" aria-live="polite">
        <div class="confirm-icon" aria-hidden="true">!</div>
        <h2>Excluir comprovante?</h2>
        <p>Tem certeza de que deseja excluir este item?</p>
        <div class="confirm-actions">
          <button class="btn btn-secondary confirm-cancel" type="button">Cancelar</button>
          <button class="btn btn-danger confirm-delete" type="button">Excluir</button>
        </div>
      </div>
    </div>

    <div class="upload-overlay" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="upload-card">
        <div class="upload-header">
          <div>
            <h2>Arquivos do comprovante</h2>
          </div>
          <button class="btn btn-secondary upload-close" type="button">Fechar</button>
        </div>
        <div class="upload-content">
          <div class="upload-list">
            <h3>Arquivos existentes</h3>
            <ul class="upload-files" id="upload-files"></ul>
          </div>
          <div class="upload-form">
            <label class="upload-field">
              <span>Enviar Arquivos</span>
              <div class="upload-drop" data-upload-drop>
                <input
                  class="upload-input"
                  type="file"
                  accept=".pdf,application/pdf"
                  multiple
                />
                <div class="upload-drop-content">
                  <span class="upload-drop-icon" aria-hidden="true">⬆</span>
                  <strong>Pesquisar arquivos</strong>
                  <span>Arraste e solte PDFs aqui</span>
                </div>
              </div>
              <div class="upload-selected" id="upload-selected"></div>
            </label>
            <button class="btn upload-save" type="button">Salvar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="observacao-overlay" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="observacao-card">
        <div class="observacao-header">
          <div>
            <h2>Observação</h2>
          </div>
          <button class="btn btn-secondary observacao-close" type="button">Fechar</button>
        </div>
        <div class="observacao-content" id="observacao-content"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="assets/js/navbar.js" defer></script>
    <script src="assets/js/lista_comprovantes.js" defer></script>
  </body>
</html>
