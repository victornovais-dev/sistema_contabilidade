<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Comprovantes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <link rel="stylesheet" href="assets/css/lista_comprovantes.css" />
  </head>
  <body>
    <div id="navbar-root"></div>

    <div class="bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="grid"></div>
    </div>

    <main class="page page-wide">
      <header class="page-header">
        <span class="chip">Histórico</span>
        <h1>Comprovantes</h1>
      </header>

      <div
        class="filters flex flex-wrap items-center justify-between gap-4 rounded-2xl border border-orange-200/60 bg-gradient-to-r from-orange-500/80 via-orange-400/70 to-orange-500/70 p-4 shadow-lg shadow-orange-500/30 backdrop-blur-xl"
      >
        <label class="filter-field flex items-center gap-3 text-base font-semibold text-black">
          <span>Pesquisar</span>
          <div class="relative">
            <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-600">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" class="h-4 w-4">
                <rect x="3" y="5" width="18" height="16" rx="3" fill="none" stroke="currentColor" stroke-width="1.6" />
                <path d="M3 9h18" fill="none" stroke="currentColor" stroke-width="1.6" />
                <path d="M8 3v4M16 3v4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
              </svg>
            </span>
            <input
              class="filter-date-range w-56 rounded-xl border border-white/40 bg-white/85 py-2 pl-9 pr-3 text-sm text-slate-900 outline-none transition focus:border-white focus:ring-2 focus:ring-white/60"
              type="text"
              placeholder="Filtrar por período"
            />
          </div>
        </label>
        <label class="filter-field filter-type flex items-center gap-3 text-base font-semibold text-black">
          <span>Tipo</span>
          <select
            class="filter-type-select w-44 rounded-xl border border-white/40 bg-white/85 py-2 pl-3 pr-8 text-sm text-slate-900 outline-none transition focus:border-white focus:ring-2 focus:ring-white/60"
          >
            <option value="">Todos</option>
            <option value="receita">Receita</option>
            <option value="despesa">Despesa</option>
          </select>
        </label>
        <button
          class="btn btn-secondary filter-clear rounded-xl border-2 border-black/60 ring-2 ring-black/20 bg-white/15 px-5 py-2 text-sm font-semibold text-black shadow-xl backdrop-blur-lg transition hover:bg-white/25"
          type="button"
        >
          Limpar
        </button>
      </div>

      <section class="list">
        <article class="item-card" data-date="10/03/2026" data-type="receita">
          <div class="item-info">
            <div class="item-label">Valor</div>
            <div class="item-value">R$ 9.000,00</div>
          </div>
          <div class="item-info">
            <div class="item-label">Tipo</div>
            <div class="item-value">Receita</div>
          </div>
          <div class="item-info">
            <div class="item-label">Data</div>
            <div class="item-value">10/03/2026</div>
          </div>
          <div class="item-info">
            <div class="item-label">Horário</div>
            <div class="item-value">14:30</div>
          </div>
          <div class="item-actions">
            <button class="btn btn-secondary">Baixar arquivo</button>
            <button class="btn btn-danger delete-item" type="button">Excluir</button>
          </div>
        </article>

        <article class="item-card" data-date="02/03/2026" data-type="despesa">
          <div class="item-info">
            <div class="item-label">Valor</div>
            <div class="item-value">R$ 5.000,00</div>
          </div>
          <div class="item-info">
            <div class="item-label">Tipo</div>
            <div class="item-value">Despesa</div>
          </div>
          <div class="item-info">
            <div class="item-label">Data</div>
            <div class="item-value">02/03/2026</div>
          </div>
          <div class="item-info">
            <div class="item-label">Horário</div>
            <div class="item-value">09:15</div>
          </div>
          <div class="item-actions">
            <button class="btn btn-secondary">Baixar arquivo</button>
            <button class="btn btn-danger delete-item" type="button">Excluir</button>
          </div>
        </article>

        <article class="item-card" data-date="21/02/2026" data-type="despesa">
          <div class="item-info">
            <div class="item-label">Valor</div>
            <div class="item-value">R$ 980,00</div>
          </div>
          <div class="item-info">
            <div class="item-label">Tipo</div>
            <div class="item-value">Despesa</div>
          </div>
          <div class="item-info">
            <div class="item-label">Data</div>
            <div class="item-value">21/02/2026</div>
          </div>
          <div class="item-info">
            <div class="item-label">Horário</div>
            <div class="item-value">18:05</div>
          </div>
          <div class="item-actions">
            <button class="btn btn-secondary">Baixar arquivo</button>
            <button class="btn btn-danger delete-item" type="button">Excluir</button>
          </div>
        </article>
      </section>
    </main>

    <div class="confirm-overlay" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="confirm-card" role="status" aria-live="polite">
        <div class="confirm-icon" aria-hidden="true">!</div>
        <h2>Excluir comprovante?</h2>
        <p>Tem certeza de que deseja excluir este item?</p>
        <div class="confirm-actions">
          <button class="btn btn-secondary confirm-cancel" type="button">Cancelar</button>
          <button class="btn btn-danger confirm-delete" type="button">Excluir</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="assets/js/lista_comprovantes.js" defer></script>
  </body>
</html>
