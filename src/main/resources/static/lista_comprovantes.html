<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Comprovantes</title>
    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
    <script>
      (function () {
        try {
          var match = document.cookie.match(/(?:^|;\s*)theme=([^;]+)/);
          var cookieTheme = match ? decodeURIComponent(match[1]) : null;
          var theme = cookieTheme || localStorage.getItem("theme");
          document.documentElement.dataset.theme = theme === "dark" ? "dark" : "light";
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <link rel="stylesheet" href="assets/css/lista_comprovantes.css" />
    <link rel="stylesheet" href="assets/css/navbar.css" />
  </head>
  <body>
    <div id="navbar-root"></div>

    <div class="bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="grid"></div>
    </div>

    <main class="page page-wide">
      <header class="page-header">
        <span class="chip">Histórico</span>
        <h1>Comprovantes</h1>
      </header>

      <section class="filters filters-card">
        <label class="filter-field">
          <span>Pesquisar</span>
          <div class="filter-field-input-wrap">
            <span class="filter-field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" class="h-4 w-4">
                <rect x="3" y="5" width="18" height="16" rx="3" fill="none" stroke="currentColor" stroke-width="1.6" />
                <path d="M3 9h18" fill="none" stroke="currentColor" stroke-width="1.6" />
                <path d="M8 3v4M16 3v4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
              </svg>
            </span>
            <input class="filter-date-range" type="text" placeholder="Filtrar por período" />
          </div>
        </label>
        <label class="filter-field filter-type">
          <span>Tipo</span>
          <select class="filter-type-select">
            <option value="">Todos</option>
            <option value="receita">Receita</option>
            <option value="despesa">Despesa</option>
          </select>
        </label>
        <button class="btn btn-secondary filter-clear" type="button">Limpar</button>
      </section>

      <section id="list-state" class="list-state" hidden></section>
      <section class="list" id="items-list"></section>
    </main>

    <template id="item-card-template">
      <article class="item-card">
        <div class="item-info">
          <div class="item-label">Valor</div>
          <div class="item-value" data-field="valor"></div>
        </div>
        <div class="item-info">
          <div class="item-label">Tipo</div>
          <div class="item-value" data-field="tipo"></div>
        </div>
        <div class="item-info">
          <div class="item-label">Data</div>
          <div class="item-value" data-field="data"></div>
        </div>
        <div class="item-info">
          <div class="item-label">Horário</div>
          <div class="item-value" data-field="horario"></div>
        </div>
        <div class="item-actions">
          <a class="btn btn-secondary item-download" target="_blank" rel="noopener noreferrer">
            Baixar arquivo
          </a>
          <button class="btn btn-danger delete-item" type="button">Excluir</button>
        </div>
      </article>
    </template>

    <div class="confirm-overlay" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="confirm-card" role="status" aria-live="polite">
        <div class="confirm-icon" aria-hidden="true">!</div>
        <h2>Excluir comprovante?</h2>
        <p>Tem certeza de que deseja excluir este item?</p>
        <div class="confirm-actions">
          <button class="btn btn-secondary confirm-cancel" type="button">Cancelar</button>
          <button class="btn btn-danger confirm-delete" type="button">Excluir</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="assets/js/lista_comprovantes.js" defer></script>
  </body>
</html>
