<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
    <script src="/assets/js/theme-init.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/login.css" />
    <script src="assets/js/auth-session.js?v=20260425-layer6-1"></script>
  </head>
  <body>
    <div class="bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="grid"></div>
    </div>

    <main class="page">
      <section class="card">
        <header class="card-header">
          <span class="chip">Bem-vindo</span>
          <h1>Login</h1>
        </header>

        <div class="header-actions">
          <button class="theme-toggle" type="button" aria-pressed="false" aria-label="Alternar tema">
            <span class="theme-icon" aria-hidden="true"></span>
          </button>
        </div>

        <form id="login-form" class="form" action="#" method="post" accept-charset="UTF-8">
          <label class="field">
            <span>E-mail</span>
            <input id="email" type="email" name="email" placeholder="voce@empresa.com" required />
          </label>

          <label class="field">
            <span>Senha</span>
            <input id="senha" type="password" name="password" placeholder="********" required />
          </label>

          <button class="btn" type="submit">Entrar</button>
        </form>

        <p id="login-feedback" class="foot" style="margin-top: 12px"></p>
      </section>
    </main>

    <script src="assets/js/login.js" defer></script>
  </body>
</html>
