<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Boas-vindas</title>
    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
    <script src="assets/js/theme-init.js"></script>
    <link rel="stylesheet" href="assets/css/home.css" />
    <link rel="stylesheet" href="assets/css/navbar.css" />
  </head>
  <body>
    <div id="navbar-root" data-navbar-root></div>

    <div class="bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="grid"></div>
    </div>

    <main class="page page-wide">
      <section class="welcome-left" aria-label="Boas-vindas">
        <p class="welcome-line">
          <span class="welcome-prefix" data-welcome-prefix>Bem vindo de volta,</span>
          <span class="welcome-name" data-first-name>...</span>
          <span aria-hidden="true">👋</span>
        </p>
      </section>

      <section class="home-metrics" aria-label="Resumo financeiro">
        <article class="metric-card metric-card-positive">
          <h2 class="metric-title">Receita</h2>
          <p class="metric-value metric-value-positive" data-metric="receitas">R$ 0,00</p>
          <p class="metric-pill metric-pill-positive" data-pill="receitas" hidden></p>
        </article>
        <article class="metric-card metric-card-negative">
          <h2 class="metric-title">Despesas</h2>
          <p class="metric-value metric-value-negative" data-metric="despesas">R$ 0,00</p>
          <p class="metric-pill metric-pill-negative" data-pill="despesas" hidden></p>
        </article>
        <article class="metric-card metric-card-positive">
          <h2 class="metric-title">Resultado líquido</h2>
          <p class="metric-value metric-value-positive" data-metric="saldoFinal">R$ 0,00</p>
          <p class="metric-pill metric-pill-positive" data-pill="saldoFinal" hidden></p>
        </article>
        <article class="metric-card metric-card-neutral">
          <h2 class="metric-title">Saldo Final</h2>
          <p class="metric-value metric-value-neutral" data-metric="saldoEmCaixa">R$ 0,00</p>
          <p class="metric-pill metric-pill-neutral">Saldo</p>
        </article>
      </section>
    </main>

    <script src="assets/js/navbar.js" defer></script>
    <script src="assets/js/home-welcome.js" defer></script>
    <script src="assets/js/home-metrics.js" defer></script>
  </body>
</html>
