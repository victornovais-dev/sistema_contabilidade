<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Criar Usuario</title>
    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
    <script>
      (function () {
        try {
          var match = document.cookie.match(/(?:^|;\s*)theme=([^;]+)/);
          var cookieTheme = match ? decodeURIComponent(match[1]) : null;
          var theme = cookieTheme || localStorage.getItem("theme");
          document.documentElement.dataset.theme = theme === "dark" ? "dark" : "light";
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/criar_usuario.css?v=20260316-2" />
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-content">
        <a class="brand" href="/home" aria-label="Ir para a home">
          <span class="brand-mark">SC</span>
          <span class="brand-name">Sistema</span>
        </a>
        <div class="nav-actions">
          <button
            class="logout-btn"
            type="button"
            aria-label="Sair da conta"
            onclick="localStorage.removeItem('sc_access_token'); document.cookie='SC_TOKEN=; Max-Age=0; path=/'; window.location.href='/login';"
          >
            Logout
          </button>
          <button class="theme-toggle" type="button" aria-pressed="false" aria-label="Alternar tema">
            <span class="theme-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </nav>

    <div class="bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="grid"></div>
    </div>

    <main class="page page-wide">
      <header class="page-header">
        <span class="chip">Usuario</span>
        <h1>Criar usuario</h1>
        <p>Preencha os dados para cadastrar um novo usuario.</p>
      </header>

      <section class="card">
        <form id="create-user-form" class="form" action="#" method="post">
          <label class="field">
            <span>Nome</span>
            <input id="nome" type="text" name="nome" placeholder="Nome completo" required />
          </label>

          <label class="field">
            <span>Email</span>
            <input id="email" type="email" name="email" placeholder="usuario@email.com" required />
          </label>

          <label class="field">
            <span>Senha</span>
            <input id="senha" type="password" name="senha" placeholder="Minimo 6 caracteres" minlength="6" required />
          </label>

          <label class="field">
            <span>Roles</span>
            <select id="role" name="role" required multiple size="5">
              <option value="ADMIN">ADMIN</option>
              <option value="MANAGER">MANAGER</option>
              <option value="OPERATOR">OPERATOR</option>
              <option value="SUPPORT">SUPPORT</option>
              <option value="CUSTOMER">CUSTOMER</option>
            </select>
          </label>

          <button class="btn" type="submit">Criar usuario</button>
        </form>
      </section>
    </main>

    <div id="create-user-feedback" class="confirm-overlay" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="confirm-card" role="status" aria-live="polite">
        <div class="confirm-icon" aria-hidden="true"></div>
        <h2 class="feedback-title"></h2>
        <p class="feedback-message"></p>
        <button id="feedback-ok-btn" class="btn confirm-close" type="button">Ok</button>
      </div>
    </div>

    <script src="assets/js/criar_usuario.js?v=20260316-2" defer></script>
  </body>
</html>
