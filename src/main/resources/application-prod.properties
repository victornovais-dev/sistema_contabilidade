logging.file.name=${LOG_DIR:/app/logs}/${spring.application.name}-${APP_ENV:prod}-${HOSTNAME:ec2}.json
app.logging.environment=${APP_ENV:prod}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME_PROD:${DB_USERNAME}}
spring.datasource.password=${DB_PASSWORD_PROD:${DB_PASSWORD}}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

app.storage.type=${APP_STORAGE_TYPE:s3}
app.storage.max-pdf-size-bytes=${APP_STORAGE_MAX_PDF_SIZE_BYTES:20971520}
app.storage.s3.bucket=${APP_S3_BUCKET}
app.storage.s3.region=${APP_S3_REGION:us-east-1}
app.storage.s3.endpoint=${APP_S3_ENDPOINT:}
app.storage.s3.prefix=${APP_S3_PREFIX:itens}
