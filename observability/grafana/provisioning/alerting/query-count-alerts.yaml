apiVersion: 1

groups:
  - orgId: 1
    name: sistema-contabilidade-query-count
    folder: Observability
    interval: 1m
    rules:
      - uid: sc-high-query-count-route
        title: High SQL query count per route
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: ${PROMETHEUS_DS_UID}
            model:
              editorMode: code
              expr: |
                max by (method, uri) (
                  max_over_time(http_server_query_count_max{uri!~"UNKNOWN|/actuator.*"}[5m])
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: max
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: max
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 15
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "High SQL query count on {{ $labels.method }} {{ $labels.uri }}"
          description: "{{ $labels.method }} {{ $labels.uri }} exceeded 15 SQL queries in at least one request during the last 5 minutes."
        labels:
          severity: warning
          service: sistema_contabilidade
        isPaused: false
