repos:
  - repo: local
    hooks:
      - id: spotless-check
        name: Spotless Check
        entry: .\mvnw.cmd spotless:check
        language: system
        pass_filenames: false
      - id: quality-fast
        name: Quality Fast
        entry: .\mvnw.cmd verify -Pquality-fast
        language: system
        pass_filenames: false
      - id: sonar-report
        name: SonarQube Report
        entry: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/sonar-precommit.ps1
        language: system
        pass_filenames: false
