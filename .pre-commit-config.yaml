repos:
  - repo: local
    hooks:
      - id: spotless-apply
        name: Spotless Apply
        entry: ./mvnw spotless:apply
        language: system
        pass_filenames: false
      - id: spotless-check
        name: Spotless Check
        entry: ./mvnw spotless:check
        language: system
        pass_filenames: false
      - id: checkstyle
        name: Checkstyle
        entry: ./mvnw checkstyle:check
        language: system
        pass_filenames: false
      - id: pmd
        name: PMD
        entry: ./mvnw pmd:check
        language: system
        pass_filenames: false
      - id: compile
        name: Compile
        entry: ./mvnw -DskipTests compile
        language: system
        pass_filenames: false
      - id: unit-tests
        name: Unit Tests
        entry: ./mvnw test
        language: system
        pass_filenames: false
